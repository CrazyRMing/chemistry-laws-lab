<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定比定律互動動畫 - 3B1B 風格</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- SOIL style page number and course header -->
        <div class="soil-header">
            <div class="soil-page-num" id="soil-page-num">01</div>
            <div class="soil-section-info">
                <span class="soil-course-label">基礎化學 (定比定律)</span>
                <span class="soil-orange-line"></span>
            </div>
            <a href="multiple_proportions.html" class="nav-page-link">👉 切換至倍比定律</a>
        </div>

        <!-- Explanatory Header Area -->
        <div class="info-card">
            <h1 id="step-title">定比定律探討</h1>
            <p id="step-desc">請點擊下方「下一步」開始探索化學中神奇的比例律。</p>
        </div>

        <!-- Two Canvas panels side by side -->
        <div class="animation-container">
            <!-- Left panel: chemical reaction animation -->
            <div class="panel-box left-panel">
                <div class="panel-label">化學實驗模擬</div>
                <div class="canvas-wrapper">
                    <canvas id="flaskCanvas"></canvas>
                </div>
                <div class="graph-legend-html" style="display: grid; grid-template-columns: auto auto; justify-content: center; gap: 0.6rem 1.2rem; height: 112px; box-sizing: border-box; align-content: center;">
                    <div class="legend-item" id="left-legend-item-1" style="white-space: nowrap;">
                        <span class="legend-dot" style="background-color: #cccccc;"></span>
                        <span>酸鹼中和水: H=1.34g, O=10.72g</span>
                    </div>
                    <div class="legend-item" id="left-legend-item-2" style="white-space: nowrap;">
                        <span class="legend-dot" style="background-color: #888888;"></span>
                        <span>酒精燃燒水: H=3.02g, O=24.16g</span>
                    </div>
                    <div class="legend-item" id="left-legend-item-3" style="white-space: nowrap;">
                        <span class="legend-dot" style="background-color: #444444;"></span>
                        <span>小蘇打分解水: H=0.50g, O=4.00g</span>
                    </div>
                </div>
            </div>

            <!-- Right panel: math chart coordinate graph -->
            <div class="panel-box right-panel">
                <div class="panel-label">組成質量座標圖 (w<sub>H</sub> - w<sub>O</sub>)</div>
                <div class="canvas-wrapper">
                    <canvas id="graphCanvas"></canvas>
                </div>
                <div class="graph-legend-html" style="height: 112px; box-sizing: border-box; align-content: center;">
                    <div class="legend-item" id="legend-item-1">
                        <span class="legend-dot" style="background-color: #cccccc;"></span>
                        <span>酸鹼中和水 (w<sub>O</sub> / w<sub>H</sub> = 8.0)</span>
                    </div>
                    <div class="legend-item" id="legend-item-2">
                        <span class="legend-dot" style="background-color: #888888;"></span>
                        <span>酒精燃燒水 (w<sub>O</sub> / w<sub>H</sub> = 8.0)</span>
                    </div>
                    <div class="legend-item" id="legend-item-3">
                        <span class="legend-dot" style="background-color: #444444;"></span>
                        <span>小蘇打分解水 (w<sub>O</sub> / w<sub>H</sub> = 8.0)</span>
                    </div>
                    <div class="legend-item" id="legend-item-4">
                        <span class="legend-line" style="background-color: #ff7a00; height: 3px; width: 15px; border-radius: 0;"></span>
                        <span>定比線 w<sub>O</sub> = 8 × w<sub>H</sub></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- SOIL takeaway box -->
        <div class="soil-takeaway-box" id="soil-takeaway-box">
            <span class="takeaway-icon">💡</span>
            <span class="takeaway-text" id="takeaway-text">重點：利用座標系可以直觀地分析兩種元素之間的質量定量關係。</span>
        </div>

        <!-- Navigation controller -->
        <div class="nav-control-bar">
            <button class="nav-btn" id="btn-back" onclick="prevStep()">上一步</button>
            <div class="step-indicator" id="step-indicator">步驟 1 / 8</div>
            <button class="nav-btn btn-primary" id="btn-next" onclick="nextStep()">下一步</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
