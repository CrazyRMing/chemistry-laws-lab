<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>渲染成果快速檢視看板 - AI & Developer Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FAF8F5;
            --border-color: #2b2b2b;
            --text-primary: #1f1f1f;
            --text-secondary: #5f5f5f;
            --color-orange: #ff7a00;
            --color-purple: #7c3aed;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            padding: 1.5rem;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 3px solid var(--border-color);
            background: #ffffff;
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            box-shadow: 4px 5px 0px rgba(43, 43, 43, 0.08);
            margin-bottom: 2rem;
        }

        .title-area h1 {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .title-area p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
        }

        .controls-bar {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .view-btn {
            background: #ffffff;
            border: 2px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 2px 2px 0px var(--border-color);
        }

        .view-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0px var(--border-color);
        }

        .view-btn.active {
            background: var(--border-color);
            color: #ffffff;
            box-shadow: none;
        }

        /* Dashboard Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            transition: all 0.3s ease;
        }

        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .preview-card {
            background: #ffffff;
            border: 3px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 5px 6px 0px rgba(43, 43, 43, 0.08);
            display: flex;
            flex-direction: column;
            height: 600px;
            transition: all 0.3s ease;
        }

        .card-header {
            background: #f9fafb;
            border-bottom: 2.5px solid var(--border-color);
            padding: 0.8rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .card-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-link {
            font-size: 0.8rem;
            color: var(--color-purple);
            text-decoration: none;
            font-weight: 700;
            border-bottom: 1.5px solid transparent;
            transition: border-color 0.2s;
        }

        .card-link:hover {
            border-color: var(--color-purple);
        }

        .iframe-container {
            flex-grow: 1;
            position: relative;
            background: #f3f4f6;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #ffffff;
            transition: all 0.3s ease;
            transform-origin: top left;
        }

        /* Custom viewport simulation */
        .view-mobile iframe {
            width: 375px;
            height: 667px;
            margin: 0 auto;
            display: block;
            border: 8px solid var(--border-color);
            border-radius: 20px;
            transform: scale(0.8);
            transform-origin: top center;
        }
        .view-mobile .iframe-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 1rem;
        }

        .view-tablet iframe {
            width: 768px;
            height: 1024px;
            margin: 0 auto;
            display: block;
            border: 10px solid var(--border-color);
            border-radius: 24px;
            transform: scale(0.5);
            transform-origin: top center;
        }
        .view-tablet .iframe-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 1rem;
        }

        /* Single full-screen mode */
        .dashboard-single {
            grid-template-columns: 1fr !important;
        }
        .dashboard-single .preview-card {
            height: 800px;
        }
    </style>
</head>
<body>

    <header>
        <div class="title-area">
            <h1>🔍 網頁渲染成果檢視畫布</h1>
            <p>AI 專用預覽環境 — 支援單一視窗同步載入所有子頁面，檢視 RWD 適應性與即時排版效果</p>
        </div>
        <div class="controls-bar">
            <button class="view-btn active" onclick="setViewMode('grid', this)">全部並排</button>
            <button class="view-btn" onclick="setViewMode('mobile', this)">📱 手機預覽</button>
            <button class="view-btn" onclick="setViewMode('tablet', this)">📟 平板預覽</button>
            <button class="view-btn" onclick="setViewMode('desktop', this)">💻 原始比例</button>
        </div>
    </header>

    <main class="dashboard-grid" id="dashboard" style="grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));">
        <!-- ==================== 定比定律 7 個步驟 ==================== -->
        <div class="preview-card">
            <div class="card-header"><div class="card-title">🧪 定比步驟 1 (引言)</div></div>
            <div class="iframe-container"><iframe src="index.html?step=1" title="定比步驟 1"></iframe></div>
        </div>
        <div class="preview-card">
            <div class="card-header"><div class="card-title">🧪 定比步驟 2 (滴定反應)</div></div>
            <div class="iframe-container"><iframe src="index.html?step=2" title="定比步驟 2"></iframe></div>
        </div>
        <div class="preview-card">
            <div class="card-header"><div class="card-title">🧪 定比步驟 3 (燃燒反應)</div></div>
            <div class="iframe-container"><iframe src="index.html?step=3" title="定比步驟 3"></iframe></div>
        </div>
        <div class="preview-card">
            <div class="card-header"><div class="card-title">🧪 定比步驟 4 (分解反應)</div></div>
            <div class="iframe-container"><iframe src="index.html?step=4" title="定比步驟 4"></iframe></div>
        </div>
        <div class="preview-card">
            <div class="card-header"><div class="card-title">🧪 定比步驟 5 (微觀碰撞)</div></div>
            <div class="iframe-container"><iframe src="index.html?step=5" title="定比步驟 5"></iframe></div>
        </div>
        <div class="preview-card">
            <div class="card-header"><div class="card-title">🧪 定比步驟 6 (座標繪製)</div></div>
            <div class="iframe-container"><iframe src="index.html?step=6" title="定比步驟 6"></iframe></div>
        </div>
        <div class="preview-card">
            <div class="card-header"><div class="card-title">🧪 定比步驟 7 (定比總結)</div></div>
            <div class="iframe-container"><iframe src="index.html?step=7" title="定比步驟 7"></iframe></div>
        </div>

        <!-- ==================== 倍比定律 4 個分支 ==================== -->
        <div class="preview-card">
            <div class="card-header"><div class="card-title">📐 倍比代數 固定X (9.34g)</div></div>
            <div class="iframe-container"><iframe src="multiple_proportions_explain.html?tab=algebraic&fixed=X&mass=9.34" title="倍比代數 固定X"></iframe></div>
        </div>
        <div class="preview-card">
            <div class="card-header"><div class="card-title">📐 倍比代數 固定Y (3.00g)</div></div>
            <div class="iframe-container"><iframe src="multiple_proportions_explain.html?tab=algebraic&fixed=Y&mass=3.00" title="倍比代數 固定Y"></iframe></div>
        </div>
        <div class="preview-card">
            <div class="card-header"><div class="card-title">📐 倍比幾何 固定X (4.67g)</div></div>
            <div class="iframe-container"><iframe src="multiple_proportions_explain.html?tab=geometric&fixed=X&mass=4.67" title="倍比幾何 固定X"></iframe></div>
        </div>
        <div class="preview-card">
            <div class="card-header"><div class="card-title">📐 倍比幾何 固定Y (6.00g)</div></div>
            <div class="iframe-container"><iframe src="multiple_proportions_explain.html?tab=geometric&fixed=Y&mass=6.00" title="倍比幾何 固定Y"></iframe></div>
        </div>
    </main>

    <script>
        function setViewMode(mode, btn) {
            // Update active button styling
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const dashboard = document.getElementById('dashboard');
            const cards = document.querySelectorAll('.preview-card');

            // Reset classes
            dashboard.classList.remove('dashboard-single');
            cards.forEach(card => {
                card.classList.remove('view-mobile', 'view-tablet');
            });

            if (mode === 'grid') {
                // Default grid view
            } else if (mode === 'mobile') {
                dashboard.classList.add('dashboard-single');
                cards.forEach(card => card.classList.add('view-mobile'));
            } else if (mode === 'tablet') {
                dashboard.classList.add('dashboard-single');
                cards.forEach(card => card.classList.add('view-tablet'));
            } else if (mode === 'desktop') {
                dashboard.classList.add('dashboard-single');
            }
        }
    </script>
</body>
</html>
