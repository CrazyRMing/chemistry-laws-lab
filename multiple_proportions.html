<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倍比定律互動動畫 - 3B1B 風格</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Force body to prevent horizontal scrollbars and ensure centering */
        body {
            overflow-x: hidden !important;
        }
        /* Force asymmetrical wobbly borders to be perfectly symmetric and centered */
        .app-container {
            border-radius: 12px !important;
            margin: 0 auto !important;
        }
        /* Lock description card height footprint to prevent vertical layout shifts */
        .info-card p {
            min-height: 120px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        /* Force panels to be mathematically symmetric and equal in width/height */
        .animation-container {
            display: grid !important;
            grid-template-columns: calc(50% - 1rem) calc(50% - 1rem) !important;
            gap: 2rem !important;
            align-items: stretch !important;
        }
        /* Align content columns vertically with pixel-perfect bottom alignment */
        .panel-box {
            display: grid !important;
            grid-template-rows: auto 1fr auto !important;
            gap: 0.75rem !important;
            height: 100% !important;
        }
        /* Prevent sub/sup tags from stretching the line-height of the panel labels */
        sub, sup {
            line-height: 0 !important;
            position: relative !important;
            vertical-align: baseline !important;
        }
        sub {
            bottom: -0.2em !important;
        }
        /* Lock panel-label heights to eliminate any sub-pixel misalignment from script subscripts */
        .panel-label {
            height: 24px !important;
            line-height: 24px !important;
            margin: 0 0 0.5rem 0 !important;
            padding: 0 !important;
            display: flex !important;
            align-items: center !important;
        }
        /* Ensure the canvas wrappers stretch exactly to their allocated grid heights */
        .canvas-wrapper {
            border-radius: 8px !important;
            height: 100% !important;
            box-sizing: border-box !important;
        }
        .graph-legend-html {
            height: 112px !important;
            box-sizing: border-box !important;
            align-content: center !important;
            border-radius: 8px !important;
            font-size: 0.88rem !important;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- SOIL style page number and course header -->
        <div class="soil-header">
            <div class="soil-page-num" id="soil-page-num">01</div>
            <div class="soil-section-info">
                <span class="soil-course-label">基礎化學 (倍比定律)</span>
                <span class="soil-orange-line"></span>
            </div>
            <a href="index.html" class="nav-page-link">👈 返回定比定律</a>
        </div>

        <!-- Explanatory Header Area -->
        <div class="info-card">
            <h1 id="step-title">倍比定律探討</h1>
            <p id="step-desc">請點擊下方「下一步」開始探索化學中神奇的比例律。</p>
        </div>

        <!-- Two Canvas panels side by side -->
        <div class="animation-container">
            <!-- Left panel: chemical reaction animation / visual explanation -->
            <div class="panel-box left-panel">
                <div class="panel-label">示意圖與微觀說明</div>
                <div class="canvas-wrapper">
                    <canvas id="flaskCanvas"></canvas>
                </div>
                <div class="graph-legend-html" style="display: flex; flex-direction: column; align-items: flex-start; gap: 0.6rem; justify-content: center;">
                    <div class="legend-item" id="left-legend-item-1" style="white-space: nowrap;">
                        <span class="legend-dot" style="background-color: #ff7a00;"></span>
                        <span>化合物 I (水): O=20.0g, H=2.5g</span>
                    </div>
                    <div class="legend-item" id="left-legend-item-2" style="white-space: nowrap;">
                        <span class="legend-dot" style="background-color: #7c3aed;"></span>
                        <span>化合物 II (雙氧水): O=24.0g, H=1.5g</span>
                    </div>
                </div>
            </div>

            <!-- Right panel: math chart coordinate graph -->
            <div class="panel-box right-panel">
                <div class="panel-label">組成質量座標圖 (w<sub>H</sub> - w<sub>O</sub>)</div>
                <div class="canvas-wrapper">
                    <canvas id="graphCanvas"></canvas>
                </div>
                <div class="graph-legend-html">
                    <div class="legend-item" id="legend-item-1">
                        <span class="legend-line" style="background-color: #ff7a00; height: 3px; width: 15px; border-radius: 0;"></span>
                        <span>化合物 I</span>
                    </div>
                    <div class="legend-item" id="legend-item-2">
                        <span class="legend-line" style="background-color: #7c3aed; height: 3px; width: 15px; border-radius: 0;"></span>
                        <span>化合物 II</span>
                    </div>
                    <div class="legend-item" id="legend-item-3">
                        <span class="legend-line" style="background-color: #2563eb; height: 15px; width: 3px; border-radius: 0; transform: rotate(0deg);"></span>
                        <span>等氫質量線 (w<sub>H</sub> 相同)</span>
                    </div>
                    <div class="legend-item" id="legend-item-4">
                        <span class="legend-line" style="background-color: #059669; height: 3px; width: 15px; border-radius: 0;"></span>
                        <span>等氧質量線 (w<sub>O</sub> 相同)</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- SOIL takeaway box -->
        <div class="soil-takeaway-box" id="soil-takeaway-box">
            <span class="takeaway-icon">💡</span>
            <span class="takeaway-text" id="takeaway-text">重點：利用座標系可以直觀地分析兩種元素之間的質量定量關係。</span>
        </div>

        <!-- Navigation controller -->
        <div class="nav-control-bar">
            <button class="nav-btn" id="btn-back" onclick="prevStep()">上一步</button>
            <div class="step-indicator" id="step-indicator">步驟 1 / 14</div>
            <button class="nav-btn btn-primary" id="btn-next" onclick="nextStep()">下一步</button>
        </div>
    </div>

    <script src="multiple_proportions.js"></script>
</body>
</html>
